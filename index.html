<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Excel/CSV ke Leaflet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; }
    #app { display: grid; grid-template-columns: 350px 1fr; height: 100%; }
    #sidebar {
      padding: 16px;
      border-right: 1px solid #ddd;
      background: #f8fafc;
      overflow-y: auto;
    }
    #map { width: 100%; height: 100%; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    label { display: block; font-size: 14px; margin-bottom: 6px; font-weight: 600; }
    input[type="file"], input[type="number"], button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: #64748b;
    }
    .row { display: flex; gap: 10px; }
    .hint, #status { font-size: 13px; line-height: 1.5; color: #475569; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
    }
    .stat strong { display: block; font-size: 18px; margin-top: 4px; color: #0f172a; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 6px; text-align: left; }
    th { background: #f1f5f9; position: sticky; top: 0; }
    .table-wrap {
      max-height: 200px;
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    @media (max-width: 900px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      #sidebar { border-right: none; border-bottom: 1px solid #ddd; max-height: 42vh; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1>Leaflet Upload Titik</h1>

      <div class="card">
        <label>Upload Excel / CSV</label>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.txt" />
        <p class="hint">
          Sistem akan mencoba membaca kolom: <b>lat/latitude/y</b> dan <b>lon/longitude/x</b>.
        </p>
      </div>

      <div class="card">
        <label>Ukuran marker (radius)</label>
        <input type="number" id="markerRadius" value="6" min="2" max="20" />
        <div class="row" style="margin-top:10px;">
          <button id="btnRender">Tampilkan di Peta</button>
          <button id="btnClear" class="secondary" type="button">Hapus</button>
        </div>
      </div>

      <div class="card">
        <label>Contoh format data</label>
        <div class="hint" style="white-space: pre-wrap; background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e2e8f0;">longitude,latitude,nama,depth
112.7501,-7.2574,Titik 1,12.5
112.7503,-7.2578,Titik 2,18.2
112.7507,-7.2581,Titik 3,25.0</div>
      </div>

      <div class="card">
        <label>Statistik</label>
        <div class="stats">
          <div class="stat"><span>Jumlah titik</span><strong id="statCount">0</strong></div>
          <div class="stat"><span>Kolom koordinat</span><strong id="statFields">-</strong></div>
        </div>
      </div>

      <div class="card">
        <label>Preview data</label>
        <div class="table-wrap">
          <table>
            <thead><tr id="previewHead"></tr></thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <label>Status</label>
        <div id="status">Menunggu file diunggah.</div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    const map = L.map('map').setView([-2.5, 118], 5);

    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '&copy; Esri, Maxar, Earthstar Geographics, and the GIS User Community',
      maxZoom: 19
    }).addTo(map);

    const labels = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Labels &copy; Esri',
      maxZoom: 19
    }).addTo(map);

    const baseMaps = {
      'Satellite': satellite
    };

    const overlayMaps = {
      'Labels': labels
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);

    let rawRows = [];
    let pointLayer = L.layerGroup().addTo(map);
    let detectedFields = null;

    const fileInput = document.getElementById('fileInput');
    const btnRender = document.getElementById('btnRender');
    const btnClear = document.getElementById('btnClear');
    const statusEl = document.getElementById('status');

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function normalizeKey(key) {
      return String(key || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '');
    }

    function detectFields(rows) {
      if (!rows.length) return null;
      const keys = Object.keys(rows[0]);
      const normalized = keys.map(k => ({ raw: k, n: normalizeKey(k) }));

      const findField = (candidates) => {
        for (const cand of candidates) {
          const found = normalized.find(k => k.n === cand || k.n.includes(cand));
          if (found) return found.raw;
        }
        return null;
      };

      return {
        lonField: findField(['longitude', 'lon', 'x']),
        latField: findField(['latitude', 'lat', 'y']),
        nameField: findField(['nama', 'name', 'title', 'pointname'])
      };
    }

    function toNumber(val) {
      if (val === null || val === undefined || val === '') return null;
      const cleaned = String(val).trim().replace(/,/g, '.');
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : null;
    }

    async function parseFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (['xlsx', 'xls'].includes(ext)) {
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        return XLSX.utils.sheet_to_json(ws, { defval: null });
      }

      const text = await file.text();
      const wb = XLSX.read(text, { type: 'string' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      return XLSX.utils.sheet_to_json(ws, { defval: null });
    }

    function updatePreview(rows) {
      const head = document.getElementById('previewHead');
      const body = document.getElementById('previewBody');
      head.innerHTML = '';
      body.innerHTML = '';
      if (!rows.length) return;

      const cols = Object.keys(rows[0]).slice(0, 6);
      cols.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        head.appendChild(th);
      });

      rows.slice(0, 8).forEach(row => {
        const tr = document.createElement('tr');
        cols.forEach(col => {
          const td = document.createElement('td');
          td.textContent = row[col] ?? '';
          tr.appendChild(td);
        });
        body.appendChild(tr);
      });
    }

    function updateStats(rows, fields) {
      document.getElementById('statCount').textContent = rows.length;
      document.getElementById('statFields').textContent = (fields?.lonField && fields?.latField)
        ? `${fields.lonField} / ${fields.latField}`
        : '-';
    }

    function clearPoints() {
      pointLayer.clearLayers();
      setStatus('Layer titik dihapus.');
    }

    function renderPoints(rows, fields) {
      if (!fields?.lonField || !fields?.latField) {
        throw new Error('Kolom longitude/latitude tidak ditemukan.');
      }

      pointLayer.clearLayers();
      const radius = Number(document.getElementById('markerRadius').value) || 6;
      const bounds = [];

      let validCount = 0;
      rows.forEach((row, index) => {
        const lon = toNumber(row[fields.lonField]);
        const lat = toNumber(row[fields.latField]);
        if (lon === null || lat === null || lon < -180 || lon > 180 || lat < -90 || lat > 90) return;

        validCount++;
        bounds.push([lat, lon]);

        const popupRows = Object.entries(row)
          .map(([key, value]) => `<tr><th style="text-align:left; padding:4px; border:1px solid #ddd;">${key}</th><td style="padding:4px; border:1px solid #ddd;">${value ?? ''}</td></tr>`)
          .join('');

        const title = fields.nameField && row[fields.nameField]
          ? String(row[fields.nameField])
          : `Titik ${index + 1}`;

        L.circleMarker([lat, lon], {
          radius,
          color: '#1d4ed8',
          weight: 1,
          fillColor: '#38bdf8',
          fillOpacity: 0.85
        })
          .bindPopup(`<div style="min-width:220px;"><b>${title}</b><br><table style="border-collapse:collapse; width:100%; margin-top:8px;">${popupRows}</table></div>`)
          .addTo(pointLayer);
      });

      if (!validCount) throw new Error('Tidak ada titik valid yang bisa ditampilkan.');
      map.fitBounds(bounds, { padding: [30, 30] });
      setStatus(`Berhasil menampilkan ${validCount} titik dari file upload.`);
    }

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        setStatus('Membaca file...');
        rawRows = await parseFile(file);
        if (!rawRows.length) throw new Error('File tidak berisi data.');
        detectedFields = detectFields(rawRows);
        updatePreview(rawRows);
        updateStats(rawRows, detectedFields);
        setStatus(`File ${file.name} berhasil dibaca. Klik "Tampilkan di Peta".`);
      } catch (err) {
        console.error(err);
        setStatus(`Gagal membaca file: ${err.message}`);
      }
    });

    btnRender.addEventListener('click', () => {
      try {
        if (!rawRows.length) throw new Error('Belum ada file yang diunggah.');
        renderPoints(rawRows, detectedFields);
      } catch (err) {
        console.error(err);
        setStatus(`Gagal menampilkan data: ${err.message}`);
      }
    });

    btnClear.addEventListener('click', clearPoints);
  </script>
</body>
</html>
